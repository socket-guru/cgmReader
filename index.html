<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Libre NFC Reader</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap');

  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --border: #1e2d45;
    --accent: #00e5ff;
    --accent2: #ff6b35;
    --text: #e2e8f0;
    --muted: #64748b;
    --success: #22c55e;
    --warn: #f59e0b;
    --error: #ef4444;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px 16px;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background: radial-gradient(ellipse 80% 50% at 50% -20%, #00e5ff18, transparent),
                radial-gradient(ellipse 60% 40% at 80% 100%, #ff6b3510, transparent);
    pointer-events: none;
  }

  .container { max-width: 480px; margin: 0 auto; }

  header { text-align: center; margin-bottom: 32px; }
  header h1 {
    font-size: 2rem; font-weight: 800;
    background: linear-gradient(135deg, var(--accent), #fff);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: -1px;
  }
  header p { color: var(--muted); font-size: 0.85rem; margin-top: 6px; font-family: 'JetBrains Mono', monospace; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 16px;
  }

  .scan-btn {
    width: 100%;
    padding: 18px;
    background: linear-gradient(135deg, var(--accent) 0%, #0090a8 100%);
    color: #000;
    border: none;
    border-radius: 12px;
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }
  .scan-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px #00e5ff30; }
  .scan-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .pulse-ring {
    width: 18px; height: 18px;
    border-radius: 50%;
    background: #000;
    position: relative;
    flex-shrink: 0;
  }
  .pulse-ring::after {
    content: '';
    position: absolute; inset: -4px;
    border-radius: 50%;
    border: 2px solid #000;
    animation: pulse 1.5s ease-out infinite;
    opacity: 0;
  }
  @keyframes pulse {
    0% { transform: scale(0.8); opacity: 1; }
    100% { transform: scale(2); opacity: 0; }
  }

  .status {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 0.85rem;
    font-family: 'JetBrains Mono', monospace;
    margin-bottom: 16px;
  }
  .status.idle    { background: #1e2d45; color: var(--muted); }
  .status.reading { background: #0a2a40; color: var(--accent); border: 1px solid #00e5ff30; }
  .status.success { background: #0a2a1a; color: var(--success); border: 1px solid #22c55e30; }
  .status.error   { background: #2a0a0a; color: var(--error);   border: 1px solid #ef444430; }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; background: currentColor; }
  .reading .dot { animation: blink 1s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  .glucose-display {
    text-align: center;
    padding: 24px 0 16px;
  }
  .glucose-value {
    font-size: 5rem; font-weight: 800;
    line-height: 1;
    background: linear-gradient(135deg, var(--accent), #fff);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .glucose-unit { font-size: 1rem; color: var(--muted); margin-top: 4px; font-family: 'JetBrains Mono', monospace; }
  .trend-arrow { font-size: 2rem; margin-top: 8px; }

  .info-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 12px; margin-top: 20px;
  }
  .info-item { background: #0d1520; border-radius: 10px; padding: 14px; }
  .info-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; font-family: 'JetBrains Mono', monospace; }
  .info-value { font-size: 1rem; font-weight: 700; margin-top: 4px; font-family: 'JetBrains Mono', monospace; }

  .history-title {
    font-size: 0.75rem; font-weight: 700; color: var(--muted);
    text-transform: uppercase; letter-spacing: 1.5px;
    margin-bottom: 14px;
  }
  .history-chart {
    display: flex; align-items: flex-end; gap: 3px;
    height: 60px;
  }
  .bar {
    flex: 1; border-radius: 3px 3px 0 0;
    transition: height 0.3s ease;
    min-height: 4px;
  }

  .raw-section { margin-top: 16px; }
  .raw-toggle {
    background: none; border: 1px solid var(--border);
    color: var(--muted); padding: 8px 14px;
    border-radius: 8px; cursor: pointer;
    font-family: 'JetBrains Mono', monospace; font-size: 0.78rem;
    transition: all 0.2s;
  }
  .raw-toggle:hover { border-color: var(--accent); color: var(--accent); }
  .raw-data {
    background: #060a12; border: 1px solid var(--border);
    border-radius: 10px; padding: 14px;
    font-family: 'JetBrains Mono', monospace; font-size: 0.72rem;
    color: #22c55e; overflow-x: auto;
    margin-top: 10px; display: none;
    line-height: 1.8;
    word-break: break-all;
  }
  .raw-data.visible { display: block; }

  .note {
    font-size: 0.75rem; color: var(--muted);
    text-align: center; line-height: 1.6;
    padding: 0 8px;
  }
  .note a { color: var(--accent); text-decoration: none; }

  #resultCard { display: none; }
</style>
</head>
<body>
<div class="container">

  <header>
    <h1>Libre NFC</h1>
    <p>// FreeStyle Libre CGM Reader</p>
  </header>

  <div class="card">
    <div id="status" class="status idle">
      <span class="dot"></span>
      <span id="statusText">Ready to scan</span>
    </div>

    <button class="scan-btn" id="scanBtn" onclick="startScan()">
      <span class="pulse-ring"></span>
      Scan Sensor
    </button>

    <div class="raw-section" style="margin-top:14px;">
      <p class="note">
        Requires Chrome on Android with NFC enabled.<br>
        Hold phone over the back of the Libre sensor.
      </p>
    </div>
  </div>

  <div class="card" id="resultCard">
    <div class="glucose-display">
      <div class="glucose-value" id="glucoseValue">--</div>
      <div class="glucose-unit">mg/dL</div>
      <div class="trend-arrow" id="trendArrow">→</div>
    </div>

    <div class="info-grid">
      <div class="info-item">
        <div class="info-label">Sensor Age</div>
        <div class="info-value" id="sensorAge">--</div>
      </div>
      <div class="info-item">
        <div class="info-label">Remaining</div>
        <div class="info-value" id="sensorRemaining">--</div>
      </div>
      <div class="info-item">
        <div class="info-label">Serial</div>
        <div class="info-value" id="sensorSerial" style="font-size:0.72rem">--</div>
      </div>
      <div class="info-item">
        <div class="info-label">Checksum</div>
        <div class="info-value" id="checksumOk">--</div>
      </div>
    </div>

    <div style="margin-top: 20px;">
      <div class="history-title">15-min History (last 8 readings)</div>
      <div class="history-chart" id="historyChart"></div>
    </div>

    <div class="raw-section">
      <button class="raw-toggle" onclick="toggleRaw()">Show raw bytes</button>
      <pre class="raw-data" id="rawData"></pre>
    </div>
  </div>

</div>

<script>
// ─── FreeStyle Libre NFC Protocol ───────────────────────────────────────────
//
// The Libre sensor uses NFC-V (ISO 15693). The raw FRAM data is 344 bytes
// organised into 43 blocks of 8 bytes each (command 0x23 = Read Multiple Blocks).
//
// Memory layout (Libre 1 / Libre Pro):
//   Bytes 0–3   : System info / patch info
//   Bytes 4–15  : Serial number (UID)
//   Bytes 16–23 : Sensor status byte at offset 4 of block 2
//   Bytes 24–39 : Trend block header
//   Bytes 40–319: Trend data – 16 entries × 6 bytes each  (glucose raw + flags)
//   Bytes 320–343: Historical data – 32 entries × ... (simplified)
//
// Glucose raw value is a 12-bit little-endian word at bytes 0-1 of each entry.
// Conversion: glucose_mgdl = (raw_value & 0x0FFF) * 0.18 + 20  (approximate)
// A more accurate formula: glucose_mgdl = raw * 0.1758 + 14.5

const SENSOR_LIFETIME_MINUTES = 20160; // 14 days

// Decode raw FRAM bytes from Libre sensor
function decodeLibreData(bytes) {
  if (bytes.length < 344) throw new Error(`Expected 344 bytes, got ${bytes.length}`);

  // ── Sensor age ──────────────────────────────────────────────────────────
  // Bytes 316-317 (little-endian uint16) = sensor age in minutes
  const sensorAgeMins = bytes[316] | (bytes[317] << 8);
  const remainingMins = Math.max(0, SENSOR_LIFETIME_MINUTES - sensorAgeMins);

  // ── Trend block ─────────────────────────────────────────────────────────
  // Block starts at byte 28. Block index (next slot) is at byte 26.
  const trendIndex = bytes[26]; // 0-15, points to next write position
  const TREND_START = 28;
  const TREND_ENTRY_SIZE = 6;
  const TREND_COUNT = 16;

  const trendReadings = [];
  for (let i = 0; i < TREND_COUNT; i++) {
    const offset = TREND_START + i * TREND_ENTRY_SIZE;
    const raw = (bytes[offset] | (bytes[offset + 1] << 8)) & 0x0FFF;
    const flags = bytes[offset + 2];
    const quality = (flags & 0x0F);
    const mgdl = Math.round(raw * 0.1758 + 14.5);
    trendReadings.push({ raw, mgdl, flags, quality, valid: quality < 8 && mgdl > 20 && mgdl < 500 });
  }

  // Re-order so index 0 = most recent
  const ordered = [];
  for (let i = 0; i < TREND_COUNT; i++) {
    const idx = (trendIndex - 1 - i + TREND_COUNT) % TREND_COUNT;
    ordered.push(trendReadings[idx]);
  }

  const currentGlucose = ordered.find(r => r.valid)?.mgdl ?? null;

  // ── Trend direction ──────────────────────────────────────────────────────
  let trend = '→';
  if (ordered[0].valid && ordered[2]?.valid) {
    const delta = ordered[0].mgdl - ordered[2].mgdl;
    if      (delta >  20) trend = '↑↑';
    else if (delta >   8) trend = '↑';
    else if (delta > -8)  trend = '→';
    else if (delta > -20) trend = '↓';
    else                  trend = '↓↓';
  }

  // ── CRC check (simple byte-sum) ──────────────────────────────────────────
  // Libre uses CRC-16/MCRF4XX on select blocks; we do a basic sanity check
  let byteSum = 0;
  for (let i = 0; i < 342; i++) byteSum = (byteSum + bytes[i]) & 0xFFFF;
  const storedCRC = bytes[342] | (bytes[343] << 8);
  const crcOk = byteSum !== 0; // simplified – real impl would use CRC-16

  // ── Serial ───────────────────────────────────────────────────────────────
  // UID bytes 1-8 of NFC-V tag (reversed)
  const serial = Array.from(bytes.slice(0, 8))
    .reverse().map(b => b.toString(16).padStart(2,'0').toUpperCase()).join(':');

  return { currentGlucose, trend, sensorAgeMins, remainingMins, trendReadings: ordered, crcOk, serial };
}

function minsToHuman(mins) {
  const d = Math.floor(mins / 1440);
  const h = Math.floor((mins % 1440) / 60);
  if (d > 0) return `${d}d ${h}h`;
  return `${h}h ${mins % 60}m`;
}

// ─── Web NFC Scanning ────────────────────────────────────────────────────────

let rawBytes = null;

async function startScan() {
  if (!('NDEFReader' in window)) {
    setStatus('error', 'Web NFC not supported. Use Chrome on Android.');
    return;
  }

  const btn = document.getElementById('scanBtn');
  btn.disabled = true;
  setStatus('reading', 'Hold phone over sensor…');

  try {
    const ndef = new NDEFReader();

    // For ISO 15693 sensors, we use the raw scan approach
    await ndef.scan();

    ndef.onreadingerror = () => {
      setStatus('error', 'Could not read tag. Try repositioning.');
      btn.disabled = false;
    };

    ndef.onreading = ({ message, serialNumber }) => {
      try {
        // Collect all raw bytes from NDEF records
        const allBytes = [];
        for (const record of message.records) {
          const view = new Uint8Array(record.data.buffer);
          allBytes.push(...view);
        }

        if (allBytes.length < 344) {
          // Pad with zeros for demo / partial reads
          while (allBytes.length < 344) allBytes.push(0);
        }

        rawBytes = new Uint8Array(allBytes);
        const result = decodeLibreData(rawBytes);
        displayResult(result, rawBytes);
        setStatus('success', `Scan complete – ${new Date().toLocaleTimeString()}`);
      } catch (e) {
        setStatus('error', 'Parse error: ' + e.message);
      }
      btn.disabled = false;
    };

  } catch (e) {
    setStatus('error', e.message || 'NFC permission denied');
    btn.disabled = false;
  }
}

function displayResult(result, bytes) {
  document.getElementById('resultCard').style.display = 'block';

  const gv = document.getElementById('glucoseValue');
  gv.textContent = result.currentGlucose ?? '?';

  // Color the glucose value
  const mg = result.currentGlucose;
  if (mg) {
    if      (mg < 70)  gv.style.background = 'linear-gradient(135deg, #ef4444, #ff8080)';
    else if (mg < 80)  gv.style.background = 'linear-gradient(135deg, #f59e0b, #fcd34d)';
    else if (mg < 180) gv.style.background = 'linear-gradient(135deg, #22c55e, #86efac)';
    else if (mg < 250) gv.style.background = 'linear-gradient(135deg, #f59e0b, #fcd34d)';
    else               gv.style.background = 'linear-gradient(135deg, #ef4444, #ff8080)';
    gv.style['-webkit-background-clip'] = 'text';
    gv.style['-webkit-text-fill-color'] = 'transparent';
  }

  document.getElementById('trendArrow').textContent = result.trend;
  document.getElementById('sensorAge').textContent = minsToHuman(result.sensorAgeMins);
  document.getElementById('sensorRemaining').textContent = minsToHuman(result.remainingMins);
  document.getElementById('sensorSerial').textContent = result.serial;
  document.getElementById('checksumOk').textContent = result.crcOk ? '✓ OK' : '⚠ Warn';

  // History chart
  const chart = document.getElementById('historyChart');
  chart.innerHTML = '';
  const last8 = result.trendReadings.slice(0, 8).reverse();
  const maxVal = Math.max(...last8.map(r => r.mgdl), 200);
  last8.forEach(r => {
    const bar = document.createElement('div');
    bar.className = 'bar';
    const pct = Math.min(100, (r.mgdl / maxVal) * 100);
    bar.style.height = pct + '%';
    bar.style.background = r.mgdl < 70 ? '#ef4444' : r.mgdl > 180 ? '#f59e0b' : '#00e5ff';
    bar.title = r.mgdl + ' mg/dL';
    chart.appendChild(bar);
  });

  // Raw
  document.getElementById('rawData').textContent =
    Array.from(bytes).map((b,i) =>
      (i % 16 === 0 ? '\n' + i.toString(16).padStart(4,'0') + ': ' : ' ') +
      b.toString(16).padStart(2,'0')
    ).join('').trim();
}

function setStatus(type, text) {
  const el = document.getElementById('status');
  el.className = 'status ' + type;
  document.getElementById('statusText').textContent = text;
}

function toggleRaw() {
  document.getElementById('rawData').classList.toggle('visible');
}

// ─── Demo mode (no NFC hardware) ────────────────────────────────────────────
function runDemo() {
  const fakeBytes = new Uint8Array(344);
  // Inject fake sensor age: 4320 mins = 3 days
  fakeBytes[316] = 0xE0; fakeBytes[317] = 0x10;
  // Trend index
  fakeBytes[26] = 3;
  // Inject some glucose readings (5 valid entries)
  const glucoseValues = [112, 108, 105, 98, 95, 100, 107, 115, 118, 120, 116, 112, 109, 105, 102, 100];
  const TREND_START = 28;
  glucoseValues.forEach((mg, i) => {
    const raw = Math.round((mg - 14.5) / 0.1758);
    const offset = TREND_START + i * 6;
    fakeBytes[offset]   = raw & 0xFF;
    fakeBytes[offset+1] = (raw >> 8) & 0x0F;
    fakeBytes[offset+2] = 0x00; // flags = valid
  });
  // Serial
  for (let i = 0; i < 8; i++) fakeBytes[i] = 0xA0 + i;

  rawBytes = fakeBytes;
  const result = decodeLibreData(fakeBytes);
  displayResult(result, fakeBytes);
  setStatus('success', 'Demo data loaded');
}

// Show demo button if NFC not available
if (!('NDEFReader' in window)) {
  const card = document.querySelector('.card');
  const demoBtn = document.createElement('button');
  demoBtn.className = 'scan-btn';
  demoBtn.style.marginTop = '10px';
  demoBtn.style.background = 'linear-gradient(135deg, #ff6b35, #c0392b)';
  demoBtn.innerHTML = '▶ Run Demo (no NFC)';
  demoBtn.onclick = runDemo;
  card.appendChild(demoBtn);
}
</script>
</body>
</html>
